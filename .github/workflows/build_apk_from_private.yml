name: Compilar SAEL y publicar OTA completa

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Clonar código fuente (privado)
        uses: actions/checkout@v4
        with:
          repository: oscgtz2107-ui/dashboard-app
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - name: 2. Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Instalar Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: 4. Compilar APK
        run: gradle assembleDebug

      - name: 5. Extraer versionName y generar versión única
        id: get_version
        run: |
          echo "=== Estructura del repositorio (depuración) ==="
          ls -R . | head -50
          echo "================================================"
          # Buscar build.gradle excluyendo la carpeta android/
          BUILD_FILE=$(find . -name build.gradle -not -path "./android/*" | head -1)
          if [ -z "$BUILD_FILE" ]; then
            echo "Error: No se encontró build.gradle de SAEL"
            exit 1
          fi
          echo "Archivo encontrado: $BUILD_FILE"
          VERSION_BASE=$(grep -oP 'versionName\s+"\K[^"]+' "$BUILD_FILE" | head -1)
          if [ -z "$VERSION_BASE" ]; then
            echo "Error: No se pudo extraer la versión de $BUILD_FILE"
            exit 1
          fi
          VERSION_TS=$(date +'%y%m%d%H%M%S')
          FULL_VERSION="${VERSION_BASE}.${VERSION_TS}"
          echo "VERSION_BASE=$VERSION_BASE" >> $GITHUB_OUTPUT
          echo "FULL_VERSION=$FULL_VERSION" >> $GITHUB_OUTPUT

      - name: 6. Buscar APK y crear release
        env:
          GITHUB_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          FULL_VERSION="${{ steps.get_version.outputs.FULL_VERSION }}"
          
          # Buscar APK generado (excluyendo carpeta android/)
          APK_PATH=$(find . -name "*.apk" -not -path "./android/*" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "Error: No se encontró el archivo APK"
            exit 1
          fi
          echo "APK encontrado en: $APK_PATH"
          
          gh release create "v$FULL_VERSION" "$APK_PATH" \
            --repo oscgtz2107-ui/dashboard-app \
            --title "SAEL v$FULL_VERSION" \
            --notes "Publicación automática desde GitHub Actions" \
            --draft=false

      - name: 7. Obtener URL del APK (con reintento)
        id: get_url
        env:
          GITHUB_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          FULL_VERSION="${{ steps.get_version.outputs.FULL_VERSION }}"
          RETRIES=3
          DELAY=5
          for i in $(seq 1 $RETRIES); do
            echo "Intento $i de $RETRIES..."
            URL=$(gh release view "v$FULL_VERSION" --repo oscgtz2107-ui/dashboard-app --json assets -q '.assets[0].browser_download_url' 2>/dev/null)
            
            if [ -n "$URL" ]; then
              echo "URL obtenida: $URL"
              echo "APK_URL=$URL" >> $GITHUB_OUTPUT
              exit 0
            fi
            
            if [ $i -lt $RETRIES ]; then
              echo "Activos no disponibles aún, esperando ${DELAY}s..."
              sleep $DELAY
            fi
          done
          
          echo "Error: No se pudo obtener la URL del APK después de $RETRIES intentos"
          exit 1

      - name: 8. Actualizar index.html y subir cambio
        env:
          VERSION: ${{ steps.get_version.outputs.FULL_VERSION }}
          APK_URL: ${{ steps.get_url.outputs.APK_URL }}
        run: |
          if [ -z "$APK_URL" ]; then
            echo "APK_URL vacío, abortando."
            exit 1
          fi
          sed -i "s|href=\"[^\"]*\"|href=\"$APK_URL\"|" public/index.html
          sed -i "s|Versión estable para Android.*|Versión estable para Android $VERSION | $(date +%Y) SAEL Project|" public/index.html
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add public/index.html
          git commit -m "Actualizar enlace de descarga a v$VERSION" || echo "Sin cambios para commitear"
          git push

      - name: 9. Desplegar a Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: tu-project-id-aqui
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks

      - name: 10. Clonar SAEL-OTA para version.json
        uses: actions/checkout@v4
        with:
          repository: oscgtz2107-ui/SAEL-OTA
          path: ota-repo

      - name: 11. Actualizar version.json
        env:
          FULL_VERSION: ${{ steps.get_version.outputs.FULL_VERSION }}
          APK_URL: ${{ steps.get_url.outputs.APK_URL }}
        run: |
          cd ota-repo
          cat > version.json <<EOF
          {
            "version": "$FULL_VERSION",
            "apkUrl": "$APK_URL",
            "releaseNotes": "Actualización automática a la versión $FULL_VERSION."
          }
          EOF
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add version.json
          git commit -m "Actualización OTA a v$FULL_VERSION" || echo "Sin cambios para commitear"
          git push