name: Compilar SAEL y publicar OTA completa

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Clonar código fuente (privado)
        uses: actions/checkout@v4
        with:
          repository: oscgtz2107-ui/dashboard-app
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - name: 2. Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Instalar Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: 4. Compilar APK
        run: gradle assembleDebug

      - name: 5. Extraer versionName y generar versión única
        id: get_version
        run: |
          BUILD_FILE=""
          if [ -f "app/build.gradle" ]; then
            BUILD_FILE="app/build.gradle"
          elif [ -f "app/build.gradle.kts" ]; then
            BUILD_FILE="app/build.gradle.kts"
          else
            echo "Error: No se encontró app/build.gradle ni app/build.gradle.kts"
            exit 1
          fi
          echo "Archivo de compilación: $BUILD_FILE"
          
          VERSION_BASE=$(grep -oP 'versionName\s*=\s*"\K[^"]+' "$BUILD_FILE" | head -1)
          if [ -z "$VERSION_BASE" ]; then
            echo "Error: No se pudo extraer versionName de $BUILD_FILE"
            exit 1
          fi
          echo "Versión base: $VERSION_BASE"
          
          VERSION_TS=$(date +'%y%m%d%H%M%S')
          FULL_VERSION="${VERSION_BASE}.${VERSION_TS}"
          echo "VERSION_BASE=$VERSION_BASE" >> $GITHUB_OUTPUT
          echo "FULL_VERSION=$FULL_VERSION" >> $GITHUB_OUTPUT

      - name: 6. Renombrar APK a SAEL.apk
        run: |
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          NEW_APK_PATH="app/build/outputs/apk/debug/SAEL.apk"
          cp "$APK_PATH" "$NEW_APK_PATH"
          echo "APK renombrado a SAEL.apk"

      - name: 7. Crear release, subir APK y publicar vía API REST
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          FULL_VERSION="${{ steps.get_version.outputs.FULL_VERSION }}"
          APK_PATH="app/build/outputs/apk/debug/SAEL.apk"
          
          if [ ! -f "$APK_PATH" ]; then
            echo "Error: No se encontró el APK en $APK_PATH"
            exit 1
          fi
          echo "APK encontrado en: $APK_PATH"

          OWNER="oscgtz2107-ui"
          REPO="SAEL-OTA"
          TAG_NAME="v$FULL_VERSION"
          RELEASE_NAME="SAEL v$FULL_VERSION"
          NOTES="Publicación automática desde GitHub Actions"

          # 1. Crear release (draft) usando API REST
          echo "Creando release draft..."
          CREATE_RESPONSE=$(curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$OWNER/$REPO/releases" \
            -d @- <<EOF
          {
            "tag_name": "$TAG_NAME",
            "name": "$RELEASE_NAME",
            "body": "$NOTES",
            "draft": true
          }
          EOF
          )

          RELEASE_ID=$(echo "$CREATE_RESPONSE" | jq -r '.id')
          UPLOAD_URL=$(echo "$CREATE_RESPONSE" | jq -r '.upload_url' | sed 's/{?name,label}//')

          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            echo "Error al crear release:"
            echo "$CREATE_RESPONSE"
            exit 1
          fi
          echo "Release draft creado con ID: $RELEASE_ID"

          # 2. Subir APK como asset
          echo "Subiendo APK..."
          UPLOAD_RESPONSE=$(curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary "@$APK_PATH" \
            "$UPLOAD_URL?name=SAEL.apk")

          ASSET_URL=$(echo "$UPLOAD_RESPONSE" | jq -r '.browser_download_url')

          if [ -z "$ASSET_URL" ] || [ "$ASSET_URL" = "null" ]; then
            echo "Error al subir APK:"
            echo "$UPLOAD_RESPONSE"
            exit 1
          fi
          echo "APK subido, URL: $ASSET_URL"

          # 3. Publicar release (dejar de ser draft)
          echo "Publicando release..."
          PUBLISH_RESPONSE=$(curl -s -X PATCH \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$OWNER/$REPO/releases/$RELEASE_ID" \
            -d '{"draft": false}')

          echo "Release publicado."

          # Exportar URL para siguientes pasos
          echo "APK_URL=$ASSET_URL" >> $GITHUB_OUTPUT

      - name: 8. Usar URL del APK
        id: get_url
        env:
          APK_URL: ${{ steps.create_release.outputs.APK_URL }}
        run: |
          if [ -z "$APK_URL" ]; then
            echo "Error: APK_URL vacío"
            exit 1
          fi
          echo "URL del APK: $APK_URL"
          echo "APK_URL=$APK_URL" >> $GITHUB_OUTPUT

      - name: 9. Actualizar index.html y subir cambio
        env:
          VERSION: ${{ steps.get_version.outputs.FULL_VERSION }}
          APK_URL: ${{ steps.get_url.outputs.APK_URL }}
        run: |
          if [ -z "$APK_URL" ]; then
            echo "APK_URL vacío, abortando."
            exit 1
          fi
          sed -i "s#href=\"[^\"]*\"#href=\"$APK_URL\"#" public/index.html
          sed -i "s#Versión estable para Android.*#Versión estable para Android $VERSION | $(date +%Y) SAEL Project#" public/index.html
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add public/index.html
          git commit -m "Actualizar enlace de descarga a v$VERSION" || echo "Sin cambios para commitear"
          git push

      - name: 10. Desplegar a Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: cocina-inteligente-f94d0
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks

      - name: 11. Clonar SAEL-OTA para version.json
        uses: actions/checkout@v4
        with:
          repository: oscgtz2107-ui/SAEL-OTA
          path: ota-repo

      - name: 12. Actualizar version.json
        env:
          FULL_VERSION: ${{ steps.get_version.outputs.FULL_VERSION }}
          APK_URL: ${{ steps.get_url.outputs.APK_URL }}
        run: |
          cd ota-repo
          cat > version.json <<EOF
          {
            "version": "$FULL_VERSION",
            "apkUrl": "$APK_URL",
            "releaseNotes": "Actualización automática a la versión $FULL_VERSION."
          }
          EOF
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add version.json
          git commit -m "Actualización OTA a v$FULL_VERSION" || echo "Sin cambios para commitear"
          git push