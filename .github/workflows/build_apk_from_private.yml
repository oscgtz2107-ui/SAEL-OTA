name: Compilar SAEL y publicar OTA completa

on:
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Clonar código fuente (privado)
        uses: actions/checkout@v4
        with:
          repository: oscgtz2107-ui/dashboard-app
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - name: 2. Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Instalar Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: 4. Compilar APK
        run: gradle assembleDebug

      - name: 5. Extraer versionName
        id: get_version
        run: |
    # Listar la estructura para depuración (opcional, puedes quitarlo después)
      echo "=== Estructura del repositorio ==="
      find . -maxdepth 3 -name "*.gradle" -type f
      echo "================================"
    
    # Buscar build.gradle en toda la estructura y extraer versionName
    BUILD_FILE=$(find . -name "build.gradle" -path "*/app/*" | head -1)
    if [ -z "$BUILD_FILE" ]; then
      echo "Error: No se encontró app/build.gradle"
      exit 1
    fi
    echo "Archivo encontrado: $BUILD_FILE"
    VERSION=$(grep -oP 'versionName\s+"\K[^"]+' "$BUILD_FILE" | head -1)
    if [ -z "$VERSION" ]; then
      echo "Error: No se pudo extraer la versión de $BUILD_FILE"
      exit 1
    fi
    echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: 6. Crear release en dashboard-app
        env:
          GITHUB_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          gh release create "v$VERSION" app/build/outputs/apk/debug/app-debug.apk \
            --repo oscgtz2107-ui/dashboard-app \
            --title "SAEL v$VERSION" \
            --notes "Publicación automática desde GitHub Actions" \
            --draft=false

      - name: 7. Obtener URL del APK
        id: get_url
        env:
          GITHUB_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          URL=$(gh release view "v$VERSION" --repo oscgtz2107-ui/dashboard-app --json assets -q '.assets[0].browser_download_url')
          if [ -z "$URL" ]; then
            echo "Error: No se pudo obtener la URL del APK"
            exit 1
          fi
          echo "APK_URL=$URL" >> $GITHUB_OUTPUT

      - name: 8. Actualizar index.html y subir cambio
        env:
          VERSION: ${{ steps.get_version.outputs.VERSION }}
          APK_URL: ${{ steps.get_url.outputs.APK_URL }}
        run: |
          if [ -z "$APK_URL" ]; then
            echo "APK_URL vacío, abortando."
            exit 1
          fi
          sed -i "s|href=\"[^\"]*\"|href=\"$APK_URL\"|" public/index.html
          sed -i "s|Versión estable para Android.*|Versión estable para Android $VERSION | $(date +%Y) SAEL Project|" public/index.html
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add public/index.html
          git commit -m "Actualizar enlace de descarga a v$VERSION" || echo "Sin cambios para commitear"
          git push

      - name: 9. Desplegar a Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: tu-project-id-aqui   # ← Reemplazar por tu ID real
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks

      - name: 10. Clonar SAEL-OTA para version.json
        uses: actions/checkout@v4
        with:
          repository: oscgtz2107-ui/SAEL-OTA
          path: ota-repo

      - name: 11. Actualizar version.json
        env:
          VERSION: ${{ steps.get_version.outputs.VERSION }}
          APK_URL: ${{ steps.get_url.outputs.APK_URL }}
        run: |
          cd ota-repo
          cat > version.json <<EOF
          {
            "version": "$VERSION",
            "apkUrl": "$APK_URL",
            "releaseNotes": "Actualización automática a la versión $VERSION."
          }
          EOF
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add version.json
          git commit -m "Actualización OTA a v$VERSION" || echo "Sin cambios para commitear"
          git push