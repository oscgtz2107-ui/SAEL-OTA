<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#080c14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SAEL">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>SAEL · Control Energético</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<style>
:root {
  --bg:#07090f; --surface:#0d1220; --surface2:#131a2a; --surface3:#1a2235;
  --border:rgba(255,255,255,.06); --border2:rgba(255,255,255,.10);
  --text:#e4eaf5; --text2:#8899b0; --muted:#445566;
  --teal:#00d4aa; --teal-dim:rgba(0,212,170,.08); --teal-glow:rgba(0,212,170,.15);
  --orange:#ff6b35; --orange-dim:rgba(255,107,53,.10);
  --blue:#4da6ff; --blue-dim:rgba(77,166,255,.10);
  --red:#ff5252; --red-dim:rgba(255,82,82,.10);
  --green:#00c97a;
  --font:'Syne',system-ui,sans-serif; --mono:'IBM Plex Mono',monospace;
  --r:12px; --r2:18px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{height:100%;overflow:hidden;-webkit-text-size-adjust:100%;}
body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased;overflow:hidden;}
button{font-family:var(--font);cursor:pointer;background:none;border:none;}
input,select,textarea{font-family:var(--font);}
::-webkit-scrollbar{width:2px;} ::-webkit-scrollbar-thumb{background:var(--border2);}

#app{display:flex;flex-direction:column;height:100%;overflow:hidden;}

/* Sidebar & Auth CSS */
#sidebar-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(3px); z-index:8000; opacity:0; pointer-events:none; transition:opacity 0.3s ease; }
#sidebar-overlay.active { opacity:1; pointer-events:all; }
#sidebar { position:fixed; top:0; left:0; bottom:0; width:280px; background:var(--surface); z-index:8001; transform:translateX(-100%); transition:transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow:4px 0 24px rgba(0,0,0,0.5); display:flex; flex-direction:column; touch-action:pan-y; }
#sidebar.open { transform:translateX(0); }
.sidebar-header { padding:max(env(safe-area-inset-top), 42px) 20px 20px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:14px; background:var(--surface2); }
#user-avatar { font-size:42px; color:var(--teal); }
#user-name { font-size:14px; font-weight:800; color:var(--text); word-break:break-all; line-height:1.2; }
#user-status { font-size:11px; color:var(--text2); font-family:var(--mono); margin-top:4px; }
.sidebar-btn { padding:16px 20px; text-align:left; font-size:13px; font-weight:700; color:var(--text); display:flex; align-items:center; gap:12px; transition:background 0.2s; width:100%; border-bottom:1px solid var(--border); }
.sidebar-btn:active { background:var(--surface2); color:var(--teal); }

#auth-screen { position:fixed; inset:0; background:var(--bg); z-index:10000; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; overflow-y:auto; }
.auth-box { background:var(--surface); border:1px solid var(--border); border-radius:24px; padding:32px 24px; width:100%; max-width:340px; box-shadow:0 24px 60px rgba(0,0,0,.6); display:flex; flex-direction:column; gap:16px; margin:auto; }
.auth-logo { text-align:center; font-size:24px; font-weight:800; color:var(--text); letter-spacing:2px; margin-bottom:8px; }
.auth-logo i { font-size:40px; color:var(--teal); text-shadow:0 0 20px var(--teal-glow); display:block; margin-bottom:12px; }
.auth-title { font-size:14px; color:var(--text2); text-align:center; text-transform:uppercase; font-weight:700; margin-bottom:8px; }
.auth-input { width:100%; padding:14px 16px; background:rgba(0,0,0,0.25); border:1px solid var(--border2); border-radius:12px; color:var(--text); font-size:14px; font-weight:600; outline:none; transition:all 0.2s; }
.auth-input:focus { border-color:var(--teal); box-shadow:0 0 0 3px var(--teal-dim); }
.auth-btn { width:100%; padding:14px; background:var(--teal); color:#070910; border:none; border-radius:12px; font-size:14px; font-weight:800; cursor:pointer; transition:all 0.15s; margin-top:8px; }
.auth-toggle { text-align:center; font-size:12px; color:var(--muted); cursor:pointer; margin-top:8px; }

/* Status bar */
#statusbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:calc(max(env(safe-area-inset-top), 42px) + 8px) 16px 8px 16px;background:var(--surface);border-bottom:1px solid var(--border);}
#status-logo span{color:var(--text);}
#status-conn{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;color:var(--text2);}
#conn-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);transition:all .4s;}
#conn-dot.live{background:var(--teal);box-shadow:0 0 8px var(--teal);animation:pulse 2.5s infinite;}
#conn-dot.warn{background:var(--orange);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
#status-time{font-family:var(--mono);font-size:10px;color:var(--muted);}

/* Tab bar */
#tabbar{flex-shrink:0;display:flex;background:var(--surface);border-bottom:1px solid var(--border);}
.tab-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px 8px 9px;color:var(--muted);font-size:11px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .2s,border-color .2s;}
.tab-btn i{font-size:12px;}
.tab-btn.active{color:var(--teal);border-bottom-color:var(--teal);}
#notif-badge{background:var(--orange);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;font-family:var(--mono);display:none;margin-left:2px;}
#notif-badge.visible{display:inline;}

/* Screens */
#screens{flex:1;overflow:hidden;position:relative;}
.screen{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;padding:12px 12px 70px;display:none;-webkit-overflow-scrolling:touch;}
.screen.active{display:block;}
#screen-chat.active{display:flex;flex-direction:column;padding:0;}
#screen-notif.active{display:flex;flex-direction:column;padding:0;}

/* Energy card (System Master) */
.energy-card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r2);padding:14px 16px;margin-bottom:12px;cursor:pointer;user-select:none;position:relative;overflow:hidden;}
.energy-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--teal),var(--blue));opacity:.6;}
.energy-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.energy-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text2);margin-bottom:5px;}
.energy-value{font-family:var(--mono);font-size:30px;font-weight:600;color:var(--text);line-height:1;letter-spacing:-1px;}
.energy-sub{font-size:11px;color:var(--text2);margin-top:4px;}
.energy-toggle{color:var(--muted);font-size:11px;transition:transform .25s;}
.energy-toggle.open{transform:rotate(180deg);}
.energy-divider{border:none;border-top:1px solid var(--border);margin:0 0 12px;}
.energy-bottom{display:flex;justify-content:space-between;align-items:center;}
.energy-standby{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);}
.standby-val{color:var(--orange);font-family:var(--mono);font-weight:600;}
.energy-live{font-family:var(--mono);font-size:11px;color:var(--text2);}
.live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--teal);margin-right:4px;animation:pulse 2s infinite;}

/* Detail panel */
.detail-panel{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;margin-bottom:12px;display:none;animation:slideDown .2s ease;}
.detail-panel.open{display:block;}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.detail-section{margin-bottom:12px;}
.detail-section:last-child{margin-bottom:0;}
.detail-sec-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;}
.detail-rows{display:flex;flex-direction:column;gap:6px;}
.detail-row{display:flex;align-items:center;gap:8px;}
.det-name{font-size:11px;color:var(--text2);min-width:70px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.det-w{font-family:var(--mono);font-size:10px;color:var(--muted);min-width:32px;text-align:right;flex-shrink:0;}
.det-bar-wrap{flex:1;display:flex;align-items:center;gap:6px;}
.det-bar{flex:1;height:3px;background:var(--surface3);border-radius:2px;overflow:hidden;}
.det-bar-fill{height:100%;border-radius:2px;transition:width .5s ease;}
.fill-teal{background:var(--teal);}
.fill-orange{background:var(--orange);}
.det-pct{font-family:var(--mono);font-size:9px;color:var(--text2);min-width:32px;text-align:right;flex-shrink:0;}

/* Section header */
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.section-title{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text2);display:flex;align-items:center;gap:6px;}
.section-title i{font-size:10px;}

/* Groups */
.group-section{margin-bottom:14px;}
.group-header{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--teal);border-radius:var(--r);padding:8px 12px;margin-bottom:8px;gap:8px; cursor:pointer; user-select:none; -webkit-tap-highlight-color:transparent;}
.group-left{flex:1;min-width:0;}
.group-name{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--teal);cursor:pointer;user-select:none;-webkit-user-select:none;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;word-break:normal;overflow-wrap:break-word;line-height:1.25;}
.group-name.editing{color:var(--orange);}
.group-stats{display:flex;gap:10px;font-family:var(--mono);font-size:9px;color:var(--text2);margin-top:3px;}
.group-stats strong{color:var(--text);}
.group-actions{display:flex;gap:8px;align-items:center;flex-shrink:0;}
.icon-btn{width:28px;height:28px;border-radius:7px;border:1px solid var(--border);color:var(--text2);font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.icon-btn:active{color:var(--teal);border-color:rgba(0,212,170,.3);background:var(--teal-dim);}
.group-chevron {font-size:13px; color:var(--muted); transition: transform 0.3s ease, color 0.3s;}
.group-header.open .group-chevron {transform: rotate(180deg); color:var(--teal);}
@keyframes expandAccordion { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
.group-content {display:none; animation: expandAccordion 0.25s cubic-bezier(0.4, 0, 0.2, 1);}
.group-content.open {display:block;}

/* Device grid */
.device-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.device-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:11px;display:flex;flex-direction:column;gap:7px;position:relative;overflow:hidden;transition:border-color .25s;}
.device-card.on{border-color:rgba(0,212,170,.2);}
.device-card.on::after{content:'';position:absolute;top:0;left:0;right:0;height:1.5px;background:linear-gradient(90deg,transparent,var(--teal),transparent);opacity:.7;}
.device-card.alert{border-color:rgba(255,107,53,.4);}
.device-card.alert::after{content:'';position:absolute;top:0;left:0;right:0;height:1.5px;background:linear-gradient(90deg,transparent,var(--orange),transparent);opacity:.8;}

.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:4px;}
.card-name{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text2);cursor:pointer;user-select:none;flex:1;min-width:0;line-height:1.25;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;word-break:normal;overflow-wrap:break-word;}
.card-name.single-word{-webkit-line-clamp:1;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-name.editing{color:var(--teal);}
.card-badges{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.badge-silent{font-size:9px;color:var(--orange);}
.badge-power{font-size:14px;transition:color .3s,filter .3s;flex-shrink:0;}
.badge-power.on{color:var(--teal);filter:drop-shadow(0 0 4px var(--teal));}
.badge-power.off{color:var(--muted);filter:none;}
.badge-power.alert{color:var(--orange);filter:drop-shadow(0 0 4px var(--orange));} 

.ring-wrap{display:flex;justify-content:center;align-items:center;height:56px;}
.ring{position:relative;width:62px;height:62px;}
.ring svg{position:absolute;inset:0;}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring-w{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--text);line-height:1;}
.ring-unit{font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:.5px;}
.card-energy{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.e-item{background:var(--surface2);border-radius:6px;padding:4px 6px;}
.e-lbl{font-size:8px;color:var(--text2);font-family:var(--mono);letter-spacing:.5px;text-transform:uppercase;display:block;margin-bottom:1px;}
.e-val{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--text);display:block;}
.mode-badge{display:flex;align-items:center;gap:5px;padding:5px 8px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);font-size:9px;font-weight:700;color:var(--text2);cursor:pointer;transition:all .15s;user-select:none;}
.mode-badge:active{border-color:var(--teal);color:var(--teal);}
.mode-badge.mode-ahorro{color:var(--green);border-color:rgba(0,201,122,.2);background:rgba(0,201,122,.05);}
.mode-badge.mode-auto{color:var(--blue);border-color:rgba(77,166,255,.2);background:var(--blue-dim);}
.mode-badge i{font-size:10px;}
.card-btn{width:100%;padding:8px;border-radius:8px;font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;border:1px solid;transition:all .15s;cursor:pointer;}
.card-btn:active{transform:scale(.97);}
.card-btn:disabled{opacity:.45;cursor:not-allowed;}
.btn-off{background:var(--teal-dim);color:var(--teal);border-color:rgba(0,212,170,.25);}
.btn-on{background:var(--red-dim);color:var(--red);border-color:rgba(255,82,82,.25);}
.btn-alert{background:transparent;color:var(--muted);border-color:var(--border);opacity:.7;} 

/* Group breakdown panel */
.group-breakdown{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:10px;max-height:220px;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;animation:slideDown .2s ease;}
.group-breakdown.open{display:block;}
.group-bk-toggle{display:flex;align-items:center;gap:6px;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2);cursor:pointer;margin-bottom:8px;user-select:none;padding:2px 0;}
.group-bk-toggle i{font-size:9px;transition:transform .2s;}
.group-bk-toggle i:last-child{margin-left:auto;color:var(--muted);}
.group-bk-toggle.open i:last-child{transform:rotate(180deg);}

/* Empty state */
.empty-state{text-align:center;padding:40px 20px;color:var(--text2);display:flex;flex-direction:column;align-items:center;gap:10px;}
.empty-state i{font-size:28px;color:var(--muted);opacity:.5;}
.empty-state p{font-size:13px;}
.empty-hint{font-size:11px;color:var(--muted);}
@keyframes spin{to{transform:rotate(360deg)}}
.fa-spin-css{display:inline-block;animation:spin 1s linear infinite;}

/* Schedules */
.sched-form { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:16px; margin-bottom:10px; }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
.input-wrap { position:relative; display:flex; align-items:center; }
.input-icon { position:absolute; left:14px; font-size:13px; color:var(--muted); transition:color 0.2s; pointer-events:none; }
.input-wrap:focus-within .input-icon { color:var(--teal); }
.styled-input { width:100%; padding:11px 14px 11px 38px; background:rgba(0,0,0,0.25); border:1px solid var(--border2); border-radius:11px; color:var(--text); font-size:12px; font-weight:600; outline:none; transition:all 0.2s; appearance:none; -webkit-appearance:none; }
.styled-input:focus { border-color:var(--teal); box-shadow:0 0 0 3px var(--teal-dim); }
select.styled-input { background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%238899b0%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E"); background-repeat:no-repeat; background-position:right 12px top 50%; background-size:9px auto; }
select.styled-input option { background:var(--surface2); }
.days-row { display:flex; gap:2px; background:var(--surface3); padding:4px; border-radius:11px; margin-bottom:16px; }
.day-btn-local { flex:1; padding:8px 0; text-align:center; font-size:10px; font-weight:700; color:var(--muted); border-radius:8px; cursor:pointer; transition:all 0.2s; user-select:none; }
.day-btn-local.active { background:var(--teal); color:#07090f; box-shadow:0 2px 8px rgba(0,212,170,0.3); }
.form-actions { display:flex; gap:8px; }
.btn-save { flex:1; padding:12px; background:var(--teal); color:#070910; border:none; border-radius:11px; font-size:13px; font-weight:800; cursor:pointer; transition:opacity 0.15s; }
.btn-save:active { opacity:0.85; }
.btn-reset-form-local { padding:12px 16px; background:transparent; border:1px solid var(--border); border-radius:11px; color:var(--muted); font-size:13px; cursor:pointer; transition:all 0.2s; }
.btn-reset-form-local:active { color:var(--red); border-color:var(--red-dim); background:var(--red-dim); transform:scale(0.97); }
.sched-list-local{display:flex;flex-direction:column;gap:7px;margin-top:10px;}
.sched-item{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:10px 12px;}
.sched-info{flex:1;min-width:0;}
.sched-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sched-detail{font-size:9px;color:var(--text2);font-family:var(--mono);margin-top:2px;}
.sched-badge{font-size:9px;font-weight:700;padding:3px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0;}
.sched-badge.on{background:var(--teal-dim);color:var(--teal);}
.sched-badge.off{background:var(--red-dim);color:var(--red);}
.sched-prio{font-family:var(--mono);font-size:9px;color:var(--muted);flex-shrink:0;}
.sched-del{color:var(--muted);font-size:13px;padding:4px;border-radius:5px;flex-shrink:0;transition:color .15s;cursor:pointer;}
.sched-del:active{color:var(--red);}
.sched-empty{text-align:center;padding:20px;font-size:12px;color:var(--muted);}

/* Chat */
.chat-header{flex-shrink:0;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.chat-avatar{width:30px;height:30px;border-radius:50%;background:var(--teal-dim);border:1px solid rgba(0,212,170,.3);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--teal);flex-shrink:0;}
.chat-name{font-size:14px;font-weight:700;line-height:1;}
.chat-sub{font-size:11px;color:var(--text2);margin-top:2px;transition:color .2s;}
.chat-sub.thinking{color:var(--teal);}
.chat-msgs{flex:1;overflow-y:auto;padding:14px 14px 6px;display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch;}
.msg{max-width:85%;padding:10px 13px;border-radius:15px;font-size:13px;line-height:1.55;word-break:break-word;white-space:pre-wrap;animation:msgIn .18s ease;}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.msg.user{align-self:flex-end;background:var(--blue);color:#fff;border-bottom-right-radius:4px;}
.msg.ai{align-self:flex-start;background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:4px;}
.msg.system{align-self:center;background:var(--surface2);color:var(--text2);font-size:11px;border:1px dashed var(--border2);border-radius:9px;text-align:center;}
.msg.thinking{align-self:flex-start;background:var(--surface2);border:1px solid var(--border);}
.dots{display:inline-flex;gap:4px;padding:4px 2px;}
.dots span{width:6px;height:6px;border-radius:50%;background:var(--text2);animation:blink 1.2s infinite;}
.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
.chat-chips{flex-shrink:0;padding:8px 14px 0;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;}
.chat-chips::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;padding:6px 11px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;font-size:10px;font-weight:600;color:var(--text2);cursor:pointer;white-space:nowrap;transition:border-color .15s,color .15s;user-select:none;}
.chip:active{border-color:var(--teal);color:var(--teal);}
.chat-input-area{flex-shrink:0;padding:10px 14px 16px;background:var(--surface);border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end;}
#chatInput{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:13px;padding:11px 14px;color:var(--text);font-size:14px;outline:none;resize:none;max-height:100px;min-height:44px;line-height:1.4;transition:border-color .2s;}
#chatInput:focus{border-color:rgba(0,212,170,.35);}
#chatInput::placeholder{color:var(--muted);}
#sendBtn{width:44px;height:44px;border-radius:12px;background:var(--teal);color:#07090f;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s,transform .1s;}
#sendBtn:active{transform:scale(.93);}
#sendBtn:disabled{opacity:.4;}

/* Live */
#liveBtn{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:20px;background:rgba(0,212,170,.1);border:1px solid rgba(0,212,170,.25);color:var(--teal);font-size:12px;font-weight:700;letter-spacing:.05em;transition:all .2s;}
#liveBtn:active{transform:scale(.95);}
#liveBtn.active{background:rgba(0,212,170,.2);border-color:var(--teal);box-shadow:0 0 16px rgba(0,212,170,.3);}
#liveBtn i{font-size:13px;}
#live-overlay{position:fixed;inset:0;z-index:9999;display:none;align-items:center;justify-content:center;}
#live-overlay.active{display:flex;}
#live-bg{position:absolute;inset:0;background:rgba(3,5,10,.97);backdrop-filter:blur(20px);}
#live-container{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:24px;padding:32px 24px;width:100%;max-width:340px;}
#live-title{font-size:11px;letter-spacing:.3em;font-family:var(--mono);color:var(--text2);text-transform:uppercase;}
#live-title span{color:var(--teal);}
#live-subtitle{font-size:14px;color:var(--text2);font-family:var(--mono);transition:color .3s;}
#live-subtitle.listening{color:var(--teal);}
#live-subtitle.speaking{color:#4da6ff;}
#live-subtitle.thinking{color:var(--orange);}
#live-orb-wrap{position:relative;width:180px;height:180px;display:flex;align-items:center;justify-content:center;}
#live-orb{position:relative;width:140px;height:140px;display:flex;align-items:center;justify-content:center;}
.orb-ring{position:absolute;border-radius:50%;border:1px solid rgba(0,212,170,.2);}
.r1{width:140px;height:140px;animation:orb-spin 8s linear infinite;}
.r2{width:110px;height:110px;animation:orb-spin 5s linear infinite reverse;border-color:rgba(77,166,255,.2);}
.r3{width:80px;height:80px;animation:orb-spin 3s linear infinite;border-color:rgba(0,212,170,.1);}
@keyframes orb-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.orb-ring::before{content:'';position:absolute;width:6px;height:6px;border-radius:50%;background:var(--teal);top:-3px;left:50%;transform:translateX(-50%);}
.r2::before{background:#4da6ff;}
.r3::before{display:none;}
#orb-core{width:60px;height:60px;border-radius:50%;background:radial-gradient(circle at 40% 35%,rgba(0,212,170,.25),rgba(0,212,170,.05));border:1px solid rgba(0,212,170,.3);display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--teal);transition:all .3s;box-shadow:0 0 30px rgba(0,212,170,.15),inset 0 0 20px rgba(0,212,170,.05);}
#orb-core.listening{background:radial-gradient(circle,rgba(0,212,170,.4),rgba(0,212,170,.1));box-shadow:0 0 60px rgba(0,212,170,.4),inset 0 0 30px rgba(0,212,170,.2);animation:orb-pulse .8s ease-in-out infinite;}
#orb-core.speaking{background:radial-gradient(circle,rgba(77,166,255,.4),rgba(77,166,255,.1));border-color:rgba(77,166,255,.5);box-shadow:0 0 60px rgba(77,166,255,.4);color:#4da6ff;animation:orb-pulse .5s ease-in-out infinite;}
@keyframes orb-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
#live-bars{position:absolute;bottom:-20px;display:flex;gap:4px;align-items:flex-end;height:24px;}
.bar{width:3px;background:var(--teal);border-radius:2px;height:4px;transition:height .1s;opacity:.4;}
#live-overlay.listening .bar{animation:bar-dance .6s ease-in-out infinite;opacity:1;}
#live-overlay.speaking .bar{animation:bar-dance .4s ease-in-out infinite;opacity:.8;background:#4da6ff;}
.bar:nth-child(1){animation-delay:.0s}.bar:nth-child(2){animation-delay:.1s}.bar:nth-child(3){animation-delay:.2s}
.bar:nth-child(4){animation-delay:.05s}.bar:nth-child(5){animation-delay:.15s}.bar:nth-child(6){animation-delay:.25s}
.bar:nth-child(7){animation-delay:.08s}.bar:nth-child(8){animation-delay:.18s}.bar:nth-child(9){animation-delay:.28s}
@keyframes bar-dance{0%,100%{height:4px}50%{height:20px}}
#live-transcript{min-height:52px;text-align:center;font-size:14px;color:var(--text);line-height:1.5;padding:0 8px;font-family:var(--mono);max-height:120px;overflow-y:auto;}
#live-talk-btn{width:200px;padding:14px;border-radius:30px;background:rgba(0,212,170,.12);border:1px solid rgba(0,212,170,.3);color:var(--teal);font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .15s;user-select:none;-webkit-user-select:none;touch-action:none;cursor:pointer;}
#live-talk-btn.pressed{background:rgba(0,212,170,.3);box-shadow:0 0 30px rgba(0,212,170,.4),0 0 60px rgba(0,212,170,.15);transform:scale(.97);border-color:var(--teal);color:#fff;}
#live-close{color:var(--text2);font-size:13px;padding:8px 20px;border-radius:20px;border:1px solid var(--border);transition:all .2s;}
#live-close:active{color:var(--text);}

/* Notifications */
.notif-header{flex-shrink:0;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.notif-header-left{display:flex;align-items:center;gap:10px;}
.notif-avatar{width:34px;height:34px;border-radius:50%;background:var(--orange-dim);border:1px solid rgba(255,107,53,.3);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--orange);flex-shrink:0;}
.notif-title{font-size:14px;font-weight:700;}
.notif-sub{font-size:11px;color:var(--text2);margin-top:2px;}
.notif-clear{padding:6px 11px;background:none;border:1px solid var(--border);border-radius:7px;color:var(--text2);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;}
.notif-clear:active{color:var(--red);border-color:var(--red-dim);}
.notif-list{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch;}
.notif-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text2);padding:40px 0;}
.notif-empty i{font-size:28px;opacity:.3;}
.notif-empty span{font-size:13px;}
.notif-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 12px;display:flex;align-items:flex-start;gap:10px;transition:transform .2s,opacity .2s,max-height .3s;overflow:hidden;max-height:200px;touch-action:pan-y;flex-shrink:0;}
.notif-item.dismissed{transform:translateX(-110%);opacity:0;max-height:0;padding:0;margin:0;}
.notif-icon{font-size:13px;margin-top:2px;flex-shrink:0;}
.notif-icon.action{color:var(--teal);}
.notif-icon.warning{color:var(--orange);}
.notif-icon.info{color:var(--blue);}
.notif-body{flex:1;min-width:0;}
.notif-msg{font-size:12px;line-height:1.5;}
.notif-time{font-size:9px;font-family:var(--mono);color:var(--text2);margin-top:3px;}

/* Modals */
.modal-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;animation:fadeOv .15s ease;}
@keyframes fadeOv{from{opacity:0}to{opacity:1}}
.modal-box{background:var(--surface2);border:1px solid var(--border2);border-radius:20px;padding:22px;width:min(330px,92vw);display:flex;flex-direction:column;gap:13px;box-shadow:0 24px 60px rgba(0,0,0,.6);animation:modalIn .2s ease;}
@keyframes modalIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:none}}
.modal-title{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2);}
.modal-input{background:var(--surface);border:1px solid var(--border2);border-radius:11px;padding:12px 14px;color:var(--text);font-size:15px;font-weight:700;width:100%;outline:none;transition:border-color .2s;}
.modal-input:focus{border-color:rgba(0,212,170,.5);}
.modal-hint{font-size:10px;color:var(--muted);font-family:var(--mono);text-align:center;}
.modal-actions{display:flex;gap:8px;}
.modal-save{flex:1;padding:13px;background:var(--teal);color:#07090f;border:none;border-radius:11px;font-size:13px;font-weight:800;cursor:pointer;transition:opacity .15s;}
.modal-save:active{opacity:.85;}
.modal-cancel{padding:13px 16px;background:var(--surface);border:1px solid var(--border);border-radius:11px;color:var(--text2);font-size:13px;cursor:pointer;}

/* Toast */
#toast-container{position:fixed;top:16px;right:14px;z-index:99999;display:flex;flex-direction:column;gap:7px;pointer-events:none;}
.toast{background:var(--surface2);border:1px solid var(--border2);border-radius:11px;padding:10px 13px;display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;min-width:180px;max-width:280px;box-shadow:0 8px 24px rgba(0,0,0,.4);pointer-events:all;animation:toastIn .25s ease;}
.toast.fade-out{animation:toastOut .25s ease forwards;}
@keyframes toastIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}
@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateX(16px)}}
.toast i{font-size:12px;flex-shrink:0;}
.toast.info{color:var(--text);}
.toast.success{color:var(--teal);border-color:rgba(0,212,170,.3);}
.toast.warning{color:var(--orange);border-color:rgba(255,107,53,.3);}
.toast.error{color:var(--red);border-color:rgba(255,82,82,.3);}

/* Install */
#install-btn{position:fixed;bottom:80px;right:14px;z-index:90;background:var(--teal);color:#07090f;border:none;border-radius:20px;padding:10px 18px;font-size:12px;font-weight:800;letter-spacing:.5px;display:none;align-items:center;gap:7px;cursor:pointer;box-shadow:0 4px 20px rgba(0,212,170,.4);}
#install-btn.visible{display:flex;}

/* Radar & Discovery UI */
.btn-discovery { width:100%; padding:14px; margin-bottom:14px; border-radius:12px; background:var(--teal-dim); border:1px dashed rgba(0,212,170,.3); color:var(--teal); font-size:12px; font-weight:800; display:flex; align-items:center; justify-content:center; gap:10px; transition:all .2s; cursor:pointer;}
.btn-discovery:active { transform:scale(.97); background:rgba(0,212,170,.15); }
#radar-modal { position:fixed; inset:0; background:rgba(7,9,15,.98); backdrop-filter:blur(10px); z-index:9000; display:flex; flex-direction:column; padding:40px 20px; opacity:0; visibility:hidden; pointer-events:none; transition:opacity .25s ease, visibility .25s; }
#radar-modal.active { opacity:1; visibility:visible; pointer-events:all; }
.radar-header { display:flex; justify-content:space-between; align-items:center; color:var(--text); font-size:16px; font-weight:800; margin-bottom:40px; }
.radar-header button { color:var(--muted); font-size:20px; transition:color .2s; }
.radar-header button:active { color:var(--red); transform:scale(0.9); }
.radar-animation { position:relative; width:160px; height:160px; margin:0 auto; display:flex; align-items:center; justify-content:center; }
.radar-ring { position:absolute; width:100%; height:100%; border-radius:50%; border:2px solid var(--teal); opacity:0; animation:radarPing 2.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite; will-change:transform, opacity; }
.radar-ring.r-1 { animation-delay: 0s; }
.radar-ring.r-2 { animation-delay: 0.8s; }
.radar-ring.r-3 { animation-delay: 1.6s; }
.radar-center { font-size:32px; color:var(--teal); z-index:2; text-shadow:0 0 20px rgba(0,212,170,.4); }
@keyframes radarPing { 0% { transform:scale(0.2); opacity:1; } 100% { transform:scale(1.5); opacity:0; } }
#radar-results { flex:1; overflow-y:auto; margin-top:30px; display:flex; flex-direction:column; gap:12px; }
.radar-item { background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:16px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; transition:all .2s; user-select:none; }
.radar-item:active { border-color:var(--teal); transform:scale(.98); }
.radar-item-info { display:flex; flex-direction:column; gap:4px; }
.radar-item-title { font-size:14px; font-weight:800; color:var(--text); }
.radar-item-mac { font-size:10px; font-family:var(--mono); color:var(--muted); }
.radar-item-status { font-size:10px; font-weight:700; color:var(--orange); display:none; animation:pulse 1.5s infinite; }
.radar-item.pending { pointer-events:none; border-color:var(--orange); background:rgba(255,107,53,.05); }
.radar-item.pending .radar-item-status { display:block; }
.radar-item.pending i { display:none; }
</style>
</head>
<body>

<div id="sidebar-overlay"></div>
<div id="sidebar">
  <div class="sidebar-header">
    <i class="fa-solid fa-circle-user" id="user-avatar"></i>
    <div id="user-info">
      <div id="user-name">Invitado</div>
      <div id="user-status">Modo restringido</div>
    </div>
  </div>
  <button class="sidebar-btn" id="btn-auth-action"><i class="fa-solid fa-right-to-bracket"></i> Iniciar Sesión</button>
</div>

<div id="auth-screen" style="display:none;">
  <div class="auth-box">
    <div class="auth-logo"><i class="fa-solid fa-bolt"></i><br>SAEL</div>
    <div class="auth-title" id="auth-title">Iniciar Sesión</div>
    <input type="email" id="auth-email" class="auth-input" placeholder="Correo electrónico">
    <input type="password" id="auth-pass" class="auth-input" placeholder="Contraseña">
    <button id="auth-btn-main" class="auth-btn">Ingresar</button>
    <div class="auth-toggle" id="auth-toggle">¿No tienes cuenta? Regístrate aquí</div>
  </div>
</div>

<div id="app" style="display:none;">
  <div id="statusbar">
    <div style="display:flex; align-items:center; gap:12px;">
      <i class="fa-solid fa-bars" id="btn-menu" style="font-size:16px; color:var(--text); padding:4px; cursor:pointer;"></i>
      <div id="status-conn">
        <div id="conn-dot"></div>
        <span id="conn-label">Conectando...</span>
      </div>
    </div>
    <span id="status-time"></span>
  </div>

  <div id="tabbar">
    <button class="tab-btn active" data-tab="dashboard" id="tab-btn-dash">
      <i class="fa-solid fa-bolt"></i> Sistema
    </button>
    <button class="tab-btn" data-tab="chat" id="tab-btn-chat">
      <i class="fa-solid fa-comments"></i> Asistente
    </button>
    <button class="tab-btn" data-tab="notif" id="tab-btn-notif">
      <i class="fa-solid fa-bell"></i>
      <span id="notif-tab-label">Alertas</span>
      <span id="notif-badge"></span>
    </button>
  </div>

  <div id="screens">
    <div class="screen active" id="screen-dashboard">
      <div class="energy-card" id="main-energy-card">
        <div class="energy-top">
          <div class="energy-main">
            <div class="energy-label">Energía Total del Sistema</div>
            <div class="energy-value" id="gt-val"><i class="fa-solid fa-globe" style="color:var(--blue); font-size:24px; margin-right:8px; vertical-align:middle;"></i>0 Wh</div>
          </div>
          <i class="fa-solid fa-chevron-down energy-toggle" id="toggle-icon"></i>
        </div>
        <hr class="energy-divider">
        <div class="energy-bottom">
          <div class="energy-standby">
            <i class="fa-solid fa-leaf" style="color:var(--orange)"></i>
            Standby: <span class="standby-val" id="stby-val">0 Wh</span>
          </div>
          <div class="energy-live" id="live-watts">
            <span class="live-dot"></span>0W ahora
          </div>
        </div>
      </div>

      <div class="detail-panel" id="detail-panel">
        <div class="detail-section">
          <div class="detail-sec-label" style="color:var(--blue)">Consumo activo (Grupos)</div>
          <div class="detail-rows" id="detail-groups-active"></div>
        </div>
        <div class="detail-section">
          <div class="detail-sec-label" style="color:var(--orange)">Standby (Grupos)</div>
          <div class="detail-rows" id="detail-groups-standby"></div>
        </div>
      </div>

      <button class="btn-discovery" data-action="radar-open">
        <i class="fa-solid fa-radar"></i> Vincular nuevo grupo
      </button>

      <div id="groups-container"></div>
    </div>

    <div class="screen" id="screen-chat">
      <div class="chat-header">
        <div class="chat-avatar"><i class="fa-solid fa-brain"></i></div>
        <div style="flex:1">
          <div class="chat-name">Asistente</div>
          <div class="chat-sub" id="chat-status">IA</div>
        </div>
        <button id="liveBtn" title="Modo Live con voz">
          <i class="fa-solid fa-waveform-lines"></i>
          <span>Live</span>
        </button>
      </div>
      <div class="chat-msgs" id="chatMessages"></div>
      <div class="chat-chips" id="chips"></div>
      <div class="chat-input-area">
        <textarea id="chatInput" placeholder="Escribe un comando o pregunta..." rows="1"
          autocomplete="off" autocorrect="off" autocapitalize="sentences" spellcheck="false"></textarea>
        <button id="sendBtn"><i class="fa-solid fa-paper-plane"></i></button>
      </div>
    </div>

    <div id="live-overlay">
      <div id="live-bg"></div>
      <div id="live-container">
        <div id="live-title">SAEL <span>LIVE</span></div>
        <div id="live-subtitle" class="live-idle"></div>

        <div id="live-orb-wrap">
          <div id="live-orb">
            <div class="orb-ring r1"></div>
            <div class="orb-ring r2"></div>
            <div class="orb-ring r3"></div>
            <div id="orb-core">
              <i class="fa-solid fa-microphone" id="orb-icon"></i>
            </div>
          </div>
          <div id="live-bars">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
          </div>
        </div>

        <div id="live-transcript"></div>

        <button id="live-talk-btn">
          <i class="fa-solid fa-microphone"></i>
          <span>Toca para hablar</span>
        </button>

        <button id="live-close">
          <i class="fa-solid fa-xmark"></i> Cerrar
        </button>
      </div>
    </div>

    <div class="screen" id="screen-notif">
      <div class="notif-header">
        <div class="notif-header-left">
          <div class="notif-avatar"><i class="fa-solid fa-robot"></i></div>
          <div>
            <div class="notif-title">Alertas</div>
          </div>
        </div>
        <button class="notif-clear" id="btn-clear-notifs">
          <i class="fa-solid fa-trash-can"></i> Borrar
        </button>
      </div>
      <div class="notif-list" id="notif-list"></div>
    </div>
  </div>
</div>

<div id="radar-modal">
  <div class="radar-header">
    <span id="radar-title">Buscando grupo...</span>
    <button data-action="radar-close"><i class="fa-solid fa-xmark"></i></button>
  </div>
  <div class="radar-animation">
    <div class="radar-ring r-1"></div>
    <div class="radar-ring r-2"></div>
    <div class="radar-ring r-3"></div>
    <i class="fa-solid fa-microchip radar-center"></i>
  </div>
  <div id="radar-empty-text" style="text-align:center; color:var(--muted); font-size:13px; margin-top:24px;">No se encontraron dispositivos</div>
  <div id="radar-results"></div>
</div>

// --- Función Helper para el Toast Interactivo OTA ---
function mostrarToastActualizacion(newVersion, zipUrl, Updater) {
    var c = document.getElementById("toast-container");
    var t = document.createElement("div"); 
    t.className = "toast info";
    t.style.flexDirection = "column"; 
    t.style.alignItems = "stretch";
    
    t.innerHTML = '<div style="display:flex; align-items:center; gap:8px;">' +
                  '<i class="fa-solid fa-cloud-arrow-down" style="color:var(--teal)"></i>' +
                  '<span>Versión ' + newVersion + ' disponible</span>' +
                  '</div>' +
                  '<button id="btn-do-update" style="margin-top:8px; padding:8px; background:var(--teal); color:#07090f; border:none; border-radius:8px; font-weight:800; cursor:pointer; transition:all 0.2s;">Actualizar Ahora</button>';
    c.appendChild(t);
    
    document.getElementById("btn-do-update").addEventListener("click", function() {
        this.innerText = "Descargando e Instalando...";
        this.disabled = true;
        this.style.opacity = "0.7";
        
        Updater.download({ url: zipUrl, version: newVersion }).then(function(dl) {
            localStorage.setItem("sael_version", newVersion); // Guardamos la nueva versión
            Updater.set({ id: dl.id }); // ¡Aplica la actualización y reinicia el WebView al instante!
        }).catch(function(e) {
            t.innerHTML = '<span style="color:var(--orange)"><i class="fa-solid fa-triangle-exclamation"></i> Falló la descarga</span>';
            setTimeout(function(){ t.classList.add("fade-out"); setTimeout(function(){t.remove();}, 300); }, 3000);
        });
    });
}

var S = { groups:{}, rules:{}, ai:{}, connected:false };

var currentTab = "dashboard";
var pending = {}; 
var activeGroupsList = [];

var connectionRef = null, aiRef = null, rulesRef = null, notifRef = null;
var activeListeners = {}; 

function initDatabaseListeners() {
  if (!db || !currentUserUid) return;
  try { var cachedState = localStorage.getItem("sael_state_" + currentUserUid); if (cachedState) { var parsed = JSON.parse(cachedState); if (parsed.groups) S.groups = parsed.groups; if (parsed.rules) S.rules = parsed.rules; if (parsed.ai) S.ai = parsed.ai; schedRender(); } } catch(e) {}

  connectionRef = db.ref(".info/connected");
  connectionRef.on("value", function(s) {
    if(!currentUserUid) return;
    var wasConn = S.connected; setConn(s.val()===true);
    if (!wasConn && S.connected) {
       db.ref(getPath("groups")).once("value", function(snap) {
           if(!currentUserUid) return;
           S.groups = snap.val() || {}; schedRender(); saveCacheDebounced();
           for(var oldOff in activeListeners) { db.ref(getPath("groups/"+oldOff)).off("value"); }
           activeListeners = {};
           var gKeys = Object.keys(S.groups);
           for(var i=0; i<gKeys.length; i++) {
               (function(off) {
                   activeListeners[off] = true;
                   db.ref(getPath("groups/"+off)).on("value", function(gSnap) {
                       if(!currentUserUid) return;
                       S.groups[off] = gSnap.val() || {}; 
                       for (var k in pending) {
                           var parts = k.split("_");
                           if (parts.length === 2 && parts[0] === off) {
                               var lId = parts[1];
                               if (S.groups[off].dev && S.groups[off].dev[lId] && String(S.groups[off].dev[lId].con) === (pending[k]?"1":"0")) delete pending[k];
                           } else if (k.indexOf("m_"+off+"_")===0) {
                               var lIdM = k.split("_")[2];
                               if (S.groups[off].dev && S.groups[off].dev[lIdM] && String(S.groups[off].dev[lIdM].mode) === pending[k]) delete pending[k];
                           }
                       }
                       schedRender(); saveCacheDebounced();
                   });
               })(gKeys[i]);
           }
       });
    }
  });

  aiRef = db.ref(getPath("ai")); aiRef.on("value", function(s){ if(!currentUserUid) return; S.ai = s.val() || {}; schedRender(); saveCacheDebounced(); });
  rulesRef = db.ref(getPath("rules")); rulesRef.on("value", function(s){ if(!currentUserUid) return; S.rules = s.val() || {}; schedRender(); saveCacheDebounced(); });
  
  notifRef = db.ref(getPath("notificaciones"));
  notifRef.on("value", function(snap) {
    if(!currentUserUid) return;
    notifItems = snap.val() || {}; var cnt = Object.keys(notifItems).length;
    var badge = document.getElementById("notif-badge"); if (badge) { badge.textContent = cnt>0 ? cnt : ""; badge.classList.toggle("visible", cnt>0); }
    if (currentTab==="notif") renderNotif();
  });
  notifRef.on("child_added", function(snap) {
    if(!currentUserUid) return;
    var v = snap.val(); if (!v || !v.message) return;
    if (!isNativeApp && Notification.permission==="granted" && document.visibilityState!=="visible") { new Notification("SAEL", { body: v.message.replace(/^Asistente SAEL dice que:\s*/i,""), icon:"/icon-192.png", tag:"sael" }); }
  });
}

function stopDatabaseListeners() {
    if(!db) return;
    if(connectionRef) connectionRef.off(); if(aiRef) aiRef.off(); if(rulesRef) rulesRef.off(); if(notifRef) notifRef.off();
    for(var oldOff in activeListeners) { db.ref(getPath("groups/"+oldOff)).off(); }
    activeListeners = {};
    if(radarActive) closeRadar();
    S = { groups:{}, rules:{}, ai:{}, connected:false };
    render();
}

// --- Utilidades Ligeras ---
function toNum(v, fb) { var n=Number(v); return isFinite(n)?n:(fb||0); }
function clamp(n,a,b) { return Math.max(a,Math.min(b,n)); }
function isCon(v) { return v===1||v==="1"||v===true||v==="true"||v==="on"; }
function esc(s) { return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function fmtJ(v) {
  var n = toNum(v,0);
  if (!isFinite(n)||n<=0) return "0 Wh";
  var wh = n/3600;
  if (wh<1)    return wh.toFixed(2)+" Wh";
  if (wh<10)   return wh.toFixed(1)+" Wh";
  if (wh<1000) return Math.round(wh)+" Wh";
  var k = wh/1000;
  if (k<10)  return k.toFixed(2)+" kWh";
  if (k<100) return k.toFixed(1)+" kWh";
  return Math.round(k)+" kWh";
}

function getDevByMacId(macId) {
  for(var i=0; i<activeGroupsList.length; i++) {
     var g = S.groups[activeGroupsList[i].off];
     if(g && g.dev && g.owner_mac) {
        var localId = macId.replace(g.owner_mac+"_", "");
        if(g.dev[localId]) return { name: g.dev[localId].n || ("Aparato "+localId), absId: Number(activeGroupsList[i].off) + Number(localId), off: activeGroupsList[i].off };
     }
  }
  return null;
}

     }
     return;

var TAB_DISP = {dashboard:"block", chat:"flex", notif:"flex"};
function switchTab(tab) {
  currentTab = tab;
  var btns = document.querySelectorAll(".tab-btn");
  for (var i=0; i<btns.length; i++) { btns[i].classList.toggle("active", btns[i].getAttribute("data-tab")===tab); }
  var screens = document.querySelectorAll(".screen");
  for (var i=0; i<screens.length; i++) {
    var id = screens[i].id.replace("screen-","");
    screens[i].style.display = id===tab ? (TAB_DISP[id]||"block") : "none";
    screens[i].classList.toggle("active", id===tab);
  }
  if (tab==="chat") setTimeout(scrollChat, 80);
  if (tab==="notif") renderNotif();
}

var tX=0, tY=0, swipeZone=false; var sX=0, sY=0, sLocked=null;
function setupSwipe(el) {
  el.addEventListener("touchstart", function(e){ tX=e.touches[0].clientX; tY=e.touches[0].clientY; swipeZone=true; },{passive:true});
  el.addEventListener("touchend", function(e){
    if (!swipeZone) return; swipeZone=false;
    var dx = tX - e.changedTouches[0].clientX; var dy = Math.abs(tY - e.changedTouches[0].clientY);
    if (Math.abs(dx)<40 || dy>60) return;
    var tabs=["dashboard","chat","notif"], i=tabs.indexOf(currentTab);
    if (dx>0 && i<tabs.length-1) switchTab(tabs[i+1]); else if (dx<0 && i>0) switchTab(tabs[i-1]);
  },{passive:true});
}
var sb = document.getElementById("statusbar"); var tb = document.getElementById("tabbar");
if (sb) setupSwipe(sb); if (tb) setupSwipe(tb);

var sc = document.getElementById("screens");
if (sc) {
  sc.addEventListener("touchstart", function(e){ sX=e.touches[0].clientX; sY=e.touches[0].clientY; sLocked=null; },{passive:true});
  sc.addEventListener("touchmove", function(e){
    if (sLocked) return;
    var dx=Math.abs(e.touches[0].clientX-sX), dy=Math.abs(e.touches[0].clientY-sY);
    if (dx>12||dy>12) sLocked = (dx>dy*1.5) ? "h" : "v";
  },{passive:true});
  sc.addEventListener("touchend", function(e){
    if (sLocked!=="h") return;
    var dx = sX-e.changedTouches[0].clientX; var dy = Math.abs(sY-e.changedTouches[0].clientY);
    if (Math.abs(dx)<70 || dy>Math.abs(dx)*.6) return;
    var a = document.activeElement ? document.activeElement.tagName.toLowerCase() : "";
    if (a==="input"||a==="textarea"||a==="select") return;
    var tabs=["dashboard","chat","notif"], i=tabs.indexOf(currentTab);

  function closeMic(text) { liveListening = false; talkBtn.classList.remove("pressed"); if (recognition) { try{ recognition.stop(); }catch(ex){} recognition = null; } if (text) sendLiveMessageLive(text); }

  function initRecognition() {
    var r = new SpeechRecognition(); r.lang = "es-MX"; r.continuous = false; r.interimResults = true;
    r.onresult = function(ev) { heardSomething = true; var interim = "", final = ""; for (var i = ev.resultIndex; i < ev.results.length; i++) { if (ev.results[i].isFinal) final += ev.results[i][0].transcript; else interim += ev.results[i][0].transcript; } if (final) lastFinal += final; transcript.textContent = lastFinal || interim; };
    r.onerror = function(ev) { if (ev.error === "aborted") return; var elapsed = Date.now() - startTime; if (!heardSomething && elapsed < timeout) { setTimeout(function() { if (liveListening) { recognition = initRecognition(); recognition.start(); } }, 100); } else if (!heardSomething) { closeMic(null); transcript.textContent = "No te escuché. Toca de nuevo."; setLiveState("idle"); } };
    r.onend = function() { if (!liveListening) return; var elapsed = Date.now() - startTime; if (heardSomething) { closeMic(lastFinal.trim() || null); if (!lastFinal.trim()) setLiveState("idle"); } else if (elapsed < timeout) { setTimeout(function() { if (liveListening) { recognition = initRecognition(); recognition.start(); } }, 100); } else { closeMic(null); transcript.textContent = "No te escuché. Toca de nuevo."; setLiveState("idle"); } };
    return r;
  }
  recognition = initRecognition(); recognition.start();
  setTimeout(function() { if (liveListening && !heardSomething) { closeMic(null); transcript.textContent = "No te escuché. Toca de nuevo."; setLiveState("idle"); } }, timeout + 500);
}

function sendLiveMessageLive(text) {
  if (!text) return; setLiveState("thinking"); var histCopy = hist.slice(-6);
  fetch(BACKEND + "/comando", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({token:TOKEN, texto:text, source:"chat", history:histCopy, uid:currentUserUid}), signal: AbortSignal.timeout(18000) })
  .then(function(r){ return r.json().catch(function(){return {};}); })
  .then(function(d) { var reply = d.reply || "Procesado."; document.getElementById("live-transcript").textContent = reply; addMsg(text, "user"); addMsg(reply, "ai"); if (d.tipo === "accion") toast(reply.slice(0,60), "success", "bolt"); speakJarvis(reply); })
  .catch(function() { var msg = "Sin conexión con el asistente."; document.getElementById("live-transcript").textContent = msg; speakJarvis(msg); setLiveState("idle"); });
}

// ===========================================================
// MATCHMAKER: PROTOCOLO DE VINCULACIÓN (2FA Físico)
// ===========================================================
var radarActive = false;
var radarListenerRef = null;
var pairingPendingMac = null;

function openRadar() {
  if (!requireAuth()) return;
  
  document.getElementById("radar-modal").classList.add("active");
  document.getElementById("radar-empty-text").style.display = "block";
  document.getElementById("radar-results").innerHTML = "";
  document.getElementById("radar-title").textContent = "Buscando grupo...";
  
  radarActive = true;
  pairingPendingMac = null;
  history.pushState({radar:'open'}, '');
  
  if (radarListenerRef) radarListenerRef.off(); 
  
  radarListenerRef = db.ref("unclaimed_groups");
  radarListenerRef.on("value", function(snap) {
    if (!radarActive) return;
    var unclaimed = snap.val() || {};
    
    if (pairingPendingMac && !unclaimed[pairingPendingMac]) {
       pairingPendingMac = null;
       document.getElementById("radar-title").textContent = "Buscando grupo...";
       toast("El hardware se desconectó", "warning", "plug-circle-xmark");
    }

    var resultsDiv = document.getElementById("radar-results");
    var foundHtml = "";
    var count = 0;

    for (var mac in unclaimed) {
      count++;
      var data = unclaimed[mac];
      var isPending = (pairingPendingMac === mac && data.solicitud_vinculacion === "pendiente");
      
      if (pairingPendingMac === mac && data.solicitud_vinculacion === "aceptada") {
         pairingPendingMac = null; 
         claimDevice(mac, data); 
         return; 
      }
      
      if (pairingPendingMac === mac && data.solicitud_vinculacion === "rechazada") {
         pairingPendingMac = null;
         toast("Su solicitud fue rechazada", "error", "circle-xmark");
         document.getElementById("radar-title").textContent = "Buscando grupo...";
         db.ref("unclaimed_groups/" + mac + "/solicitud_vinculacion").remove();
      }

      foundHtml += '<div class="radar-item ' + (isPending ? 'pending' : '') + '" data-mac="' + mac + '">' +
          '<div class="radar-item-info">' +
            '<span class="radar-item-title">Grupo Encontrado</span>' +
            '<span class="radar-item-mac">MAC: ' + mac + '</span>' +
            '<span class="radar-item-status">Confirma en la pantalla LCD de la placa...</span>' +
          '</div>' +
          '<i class="fa-solid fa-link" style="color:var(--text2);"></i>' +
        '</div>';
    }
    
    document.getElementById("radar-empty-text").style.display = count > 0 ? "none" : "block";
    resultsDiv.innerHTML = foundHtml;
  });
}

function requestPairing(mac) {
  if (pairingPendingMac || !db) return; 
  
  pairingPendingMac = mac;
  document.getElementById("radar-title").textContent = "Esperando hardware...";
  
  db.ref("unclaimed_groups/" + mac).update({ solicitud_vinculacion: "pendiente" })
    .then(function() { 
      toast("Solicitud enviada. Revisa la pantalla.", "info", "envelope"); 
    })
    .catch(function() { 
      pairingPendingMac = null; 
      document.getElementById("radar-title").textContent = "Buscando grupo...";
      toast("Error de conexión", "error", "triangle-exclamation"); 
    });
}

function claimDevice(mac, data) {
  var newOffset = "offset_" + Date.now().toString().slice(-6); 
  var newGroupData = { owner_mac: mac, name: "Nuevo Grupo", gt: 0, stby: 0, v_ac: 127, dev: {} };

  db.ref(getPath("groups/" + newOffset)).set(newGroupData)
    .then(function() { return db.ref("unclaimed_groups/" + mac).remove(); })
    .then(function() {
      history.back(); // Trigger popstate to close radar correctly
      toast("Grupo vinculado con éxito", "success", "check-double");
    })
    .catch(function() { 
      toast("Error en vinculación", "error", "triangle-exclamation"); 
    });
}

function closeRadar() {
  if (pairingPendingMac && db) {
    db.ref("unclaimed_groups/" + pairingPendingMac + "/solicitud_vinculacion").remove();
  }
  radarActive = false;
  pairingPendingMac = null;
  document.getElementById("radar-modal").classList.remove("active");
  if (radarListenerRef) { 
    radarListenerRef.off(); 
    radarListenerRef = null; 
  }
}
